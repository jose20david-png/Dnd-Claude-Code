<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Dice Roll</title>
<style>body{background:#0a0a16;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:Georgia,serif;color:#fff;user-select:none;cursor:pointer}#title{font-size:0.75rem;letter-spacing:5px;text-transform:uppercase;color:#444;margin-bottom:6px}#dice-row{display:flex;gap:52px;align-items:center;justify-content:center}.die-wrap{display:flex;flex-direction:column;align-items:center;transition:opacity 0.55s,transform 0.55s}.die-svg{width:170px;height:170px;filter:drop-shadow(0 0 14px rgba(212,175,55,0.30));transition:filter 0.5s}.die-svg.lit{filter:drop-shadow(0 0 30px rgba(255,215,0,0.80)) drop-shadow(0 0 65px rgba(255,165,0,0.30))}.face{fill:rgba(212,175,55,0.09);stroke:#b8921e;stroke-width:2;transition:fill 0.45s,stroke 0.45s}.face.lit{fill:rgba(255,215,0,0.17);stroke:#ffd700;stroke-width:2.6}.die-num{fill:#d0d0d0;text-anchor:middle;dominant-baseline:central;transition:fill 0.35s;font-weight:bold}.die-num.lit{fill:#ffd700}.die-label{font-size:10px;fill:#555;text-anchor:middle;letter-spacing:2.5px}#result{margin-top:28px;display:flex;flex-direction:column;align-items:center;gap:7px;opacity:0;transform:translateY(10px);transition:opacity 0.45s,transform 0.45s}#result.show{opacity:1;transform:translateY(0)}.total{font-size:3.1rem;font-weight:bold;color:#ffd700;text-shadow:0 0 28px rgba(255,215,0,0.40);letter-spacing:2px}.hint{margin-top:20px;font-size:0.55rem;color:#222;letter-spacing:2px}</style></head>
<body onclick="closePage()"><div id="title">Rolling</div><div id="dice-row"></div><div id="result"></div><p class="hint">CLICK TO CLOSE</p><script>'use strict';const qp=new URLSearchParams(location.search);const SIDES=parseInt(qp.get('sides')||'20');const RESULT=parseInt(qp.get('result')||'1');const MODE=(qp.get('mode')||'normal').toLowerCase();const MODIFIER=parseInt(qp.get('modifier')||'0');const SHAPES={4:{type:'path',d:'M100,12 L187,170 L13,170 Z',numY:135,fs:50},6:{type:'rect',x:18,y:18,w:164,h:164,rx:16,numY:100,fs:54},8:{type:'path',d:'M100,10 L190,100 L100,190 L10,100 Z',numY:100,fs:52},20:{type:'path',d:'M100,12 L188,168 L12,168 Z',numY:128,fs:48},100:{type:'circle',cx:100,cy:100,r:86,numY:100,fs:36}};function makeSVG(dieId){const cfg=SHAPES[SIDES]||SHAPES[20];let faceEl;if(cfg.type==='rect'){faceEl=`<rect class="face" id="face-${dieId}" x="${cfg.x}" y="${cfg.y}" width="${cfg.w}" height="${cfg.h}" rx="${cfg.rx}"/>`}else if(cfg.type==='circle'){faceEl=`<circle class="face" id="face-${dieId}" cx="${cfg.cx}" cy="${cfg.cy}" r="${cfg.r}"/>`}else{faceEl=`<path class="face" id="face-${dieId}" d="${cfg.d}"/>`}const initNum=Math.floor(Math.random()*SIDES)+1;return `<svg class="die-svg" id="svg-${dieId}" viewBox="0 0 200 200"><rect style="fill:none" width="200" height="200"/>${faceEl}<text class="die-num" id="num-${dieId}" x="100" y="${cfg.numY}" font-size="${cfg.fs}">${initNum}</text><text class="die-label" x="100" y="196">D${SIDES}</text></svg>`}const ANIM_MS=800;function animateDie(dieId,finalResult,onDone){const numEl=document.getElementById(`num-${dieId}`);const svgEl=document.getElementById(`svg-${dieId}`);const faceEl=document.getElementById(`face-${dieId}`);const t0=performance.now();let lastSwap=t0;(function tick(now){const prog=Math.min((now-t0)/ANIM_MS,1);if(prog>=1){numEl.textContent=finalResult;numEl.classList.add('lit');svgEl.classList.add('lit');faceEl.classList.add('lit');if(onDone)onDone();return}const interval=38+Math.pow(prog,1.6)*252;if((now-lastSwap)>=interval){numEl.textContent=Math.floor(Math.random()*SIDES)+1;lastSwap=now}requestAnimationFrame(tick)})(t0)}function build(){document.getElementById('title').textContent=`Rolling a D${SIDES}`;const row=document.getElementById('dice-row');const wrap=document.createElement('div');wrap.className='die-wrap';wrap.id='die-0';wrap.innerHTML=makeSVG(0);row.appendChild(wrap);const total=RESULT+MODIFIER;let html='';if(MODIFIER!==0){const sign=MODIFIER>0?'+':'';html=`<div style="font-size:1.05rem;color:#777"><b style="color:#ffd700">${RESULT}</b>&nbsp;${sign}${MODIFIER}&nbsp;=&nbsp;<b style="color:#ffd700">${total}</b></div><div class="total">${total}</div>`}else{html=`<div class="total">${RESULT}</div>`}document.getElementById('result').innerHTML=html}build();animateDie(0,RESULT,()=>{setTimeout(()=>{document.getElementById('result').classList.add('show')},150)});function closePage(){document.body.style.opacity='0';setTimeout(()=>window.close(),460)}setTimeout(closePage,5000);</script></body></html>
